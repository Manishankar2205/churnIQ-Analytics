{% extends "base.html" %}
{% block content %}
<div class="predict-grid">
    <div class="glass form-box">
        <h2>Predict Customer Churn</h2>
        <form method="POST">
            <label>Tenure (months)</label>
            <input type="number" name="tenure" required>
            
            <label>Monthly Charges ($)</label>
            <input type="number" step="0.01" name="monthly_charges" required>
            
            <label>Contract Type</label>
            <select name="contract">
                <option value="0">Month-to-month</option>
                <option value="1">One year</option>
                <option value="2">Two year</option>
            </select>
            
            <label>Internet Service</label>
            <select name="internet">
                <option value="0">DSL</option>
                <option value="1">Fiber optic</option>
                <option value="2">No</option>
            </select>
            
            <button type="submit">Predict Risk</button>
        </form>
    </div>
    
    {% if gauge %}
    <div class="glass result-box">
        <h2>Prediction Result</h2>
        {{ gauge | safe }}
        <div class="risk-badge" style="background: {{ color }}">
            {{ risk }}: {{ score }}%
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
